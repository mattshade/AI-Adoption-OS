kind = "web"
previewPath = "/"
title = "AI Tool Adoption CRM"
version = "1.0.0"
id = "artifacts/ai-adoption-crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21847

[services.development]
run = "pnpm --filter @workspace/ai-adoption-crm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-adoption-crm", "run", "build" ]
publicDir = "artifacts/ai-adoption-crm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21847"
BASE_PATH = "/"
